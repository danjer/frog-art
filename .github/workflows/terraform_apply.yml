name: 'Terraform infra deployment'

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  S3_TERRAFORM_BACKEND_BUCKET: frog-art-terraform

jobs:
  terraform:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    outputs:
      ip: ${{ steps.ip.outputs.ip }}
    defaults:
      run:
        working-directory: infrastructure/lightsail_infra

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -input=false

      - name: Get instance IP
        id: ip
        run: echo "ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

  deploy:
    name: 'Deploy App'
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform.outputs.ip }}
          username: ec2-user
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            sudo chown -R ec2-user:ec2-user /opt/frog-art
            cd /opt/frog-art
            git pull
            docker compose up -d --build

version: "3.8"

services:
  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: chromadb_container
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/data # Persistent volume for ChromaDB data
    restart: unless-stopped # Restart policy
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_container
    ports:
      - "5672:5672" # RabbitMQ broker port
      - "15672:15672" # Management dashboard
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped

  # FastAPI Application Service
  fastapi_app:
    build:
      dockerfile: ./backend/Dockerfile
    container_name: fastapi_app_container
    environment:
      CHROMADB_HOST: chromadb
    restart: unless-stopped

  # Frontend (SvelteKit static + nginx reverse proxy)
  frontend_improved:
    build:
      context: ./frontend-improved
      dockerfile: Dockerfile
    container_name: frontend_improved_container
    ports:
      - "80:80"
    depends_on:
      - fastapi_app
    restart: unless-stopped
  async_worker:
    build:
      dockerfile: ./backend/Dockerfile
    container_name: async_worker_container
    environment:
      CELERY_BROKER_URL: pyamqp://guest@rabbitmq//
      CHROMADB_HOST: chromadb
    depends_on:
      - rabbitmq
      - chromadb
    command: poetry run celery -A api worker --loglevel info --beat
    restart: unless-stopped

volumes:
  chromadb_data: # Define the named volume for ChromaDB data persistence
